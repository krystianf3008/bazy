global
    maxconn 1000

defaults
    timeout connect 10s
    timeout client 1m
    timeout server 1m

listen postgres_write
    bind *:5432
    mode tcp
    server warszawa1_master 172.20.0.2:5432 check inter 5s fall 3 rise 2
    server krakow_dr        172.20.0.5:5432 check inter 5s fall 3 rise 2 backup
    # Ruch trafia prosto do Warszawy1 (Master)
listen stats
    bind *:8404
    mode http
    stats enable
    stats hide-version
    stats refresh 5s
    stats show-node
    stats realm Haproxy\ Statistics
    stats uri /haproxy?stats
    stats auth admin:admin123
