global
    maxconn 1000

defaults
    timeout connect 10s
    timeout client 1m
    timeout server 1m

listen postgres_write
    bind *:5432
    mode tcp
    server warszawa1_master 172.20.0.2:5432 check inter 5s fall 3 rise 2
    server krakow_dr        172.20.0.5:5432 check inter 5s fall 3 rise 2 backup
