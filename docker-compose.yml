version: '3.8'

networks:
  ppv_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

services:
  # ----------------------------------------------------
  # 1. WARSZAWA 1 (MASTER - WRITE)
  # ----------------------------------------------------
  warszawa1:
    image: postgres:15
    container_name: warszawa1_master
    networks:
      ppv_net:
        ipv4_address: 172.20.0.2
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: SuperSecretPassword!
      POSTGRES_DB: ppv_db
    volumes:
      - ./postgres_init:/docker-entrypoint-initdb.d
      - pg_data_master:/var/lib/postgresql/data
      - pg_archive:/archive
    restart: always

  # ----------------------------------------------------
  # 2. WARSZAWA 2 (STANDBY - READ 1)
  # ----------------------------------------------------
  warszawa2:
    image: postgres:15
    container_name: warszawa2_read1
    networks:
      ppv_net:
        ipv4_address: 172.20.0.3
    depends_on:
      - warszawa1
    environment:
      PGPASSWORD: ReplicaPass123!
      POSTGRES_PASSWORD: ReplicaPass123!
    volumes:
      - pg_data_read1:/var/lib/postgresql/data
    command: >
      bash -c "
      if [ -z \"$$(ls -A /var/lib/postgresql/data)\" ]; then
        until pg_basebackup -h 172.20.0.2 -D /var/lib/postgresql/data -U repl_user -vP -w --wal-method=stream; do
          echo 'pg_basebackup nie powiodlo sie, czyszcze i ponawiam za 5s...';
          rm -rf /var/lib/postgresql/data/*;
          sleep 5;
        done;
        touch /var/lib/postgresql/data/standby.signal;
        echo \"primary_conninfo = 'host=172.20.0.2 port=5432 user=repl_user password=ReplicaPass123!'\" >> /var/lib/postgresql/data/postgresql.conf;
      fi;
      exec docker-entrypoint.sh postgres
      "

  # ----------------------------------------------------
  # 3. WARSZAWA 3 (STANDBY - READ 2)
  # ----------------------------------------------------
  warszawa3:
    image: postgres:15
    container_name: warszawa3_read2
    networks:
      ppv_net:
        ipv4_address: 172.20.0.4
    depends_on:
      - warszawa1
    environment:
      PGPASSWORD: ReplicaPass123!
      POSTGRES_PASSWORD: ReplicaPass123!
    volumes:
      - pg_data_read2:/var/lib/postgresql/data
    command: >
      bash -c "
      if [ -z \"$$(ls -A /var/lib/postgresql/data)\" ]; then
        until pg_basebackup -h 172.20.0.2 -D /var/lib/postgresql/data -U repl_user -vP -w --wal-method=stream; do
          echo 'pg_basebackup nie powiodlo sie, czyszcze i ponawiam za 5s...';
          rm -rf /var/lib/postgresql/data/*;
          sleep 5;
        done;
        touch /var/lib/postgresql/data/standby.signal;
        echo \"primary_conninfo = 'host=172.20.0.2 port=5432 user=repl_user password=ReplicaPass123!'\" >> /var/lib/postgresql/data/postgresql.conf;
      fi;
      exec docker-entrypoint.sh postgres
      "

  # ----------------------------------------------------
  # 4. KRAKÓW (DISASTER RECOVERY / BACKUP)
  # ----------------------------------------------------
  krakow_dr:
    image: postgres:15
    container_name: krakow_dr
    networks:
      ppv_net:
        ipv4_address: 172.20.0.5
    depends_on:
      - warszawa1
    environment:
      PGPASSWORD: ReplicaPass123!
      POSTGRES_PASSWORD: ReplicaPass123!
    volumes:
      - pg_data_dr:/var/lib/postgresql/data
      - pg_archive:/archive
    command: >
      bash -c "
      if [ -z \"$$(ls -A /var/lib/postgresql/data)\" ]; then
        until pg_basebackup -h 172.20.0.2 -D /var/lib/postgresql/data -U repl_user -vP -w --wal-method=stream; do
          echo 'pg_basebackup nie powiodlo sie, czyszcze i ponawiam za 5s...';
          rm -rf /var/lib/postgresql/data/*;
          sleep 5;
        done;
        touch /var/lib/postgresql/data/standby.signal;
        echo \"primary_conninfo = 'host=172.20.0.2 port=5432 user=repl_user password=ReplicaPass123!'\" >> /var/lib/postgresql/data/postgresql.conf;
        echo \"restore_command = 'cp /archive/%f %p'\" >> /var/lib/postgresql/data/postgresql.conf;
      fi;
      exec docker-entrypoint.sh postgres
      "

  # ----------------------------------------------------
  # 5. HAPROXY - ZAPIS (IP: 172.20.0.6, port 5432)
  # ----------------------------------------------------
  haproxy_write:
    image: haproxy:2.4
    container_name: haproxy_write
    networks:
      ppv_net:
        ipv4_address: 172.20.0.6
    ports:
      - "5432:5432" # Dostępne na zewnątrz na porcie 5432
    volumes:
      - ./haproxy/haproxy_write.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    depends_on:
      - warszawa1

  # ----------------------------------------------------
  # 6. HAPROXY - ODCZYT (IP: 172.20.0.7, port 5433)
  # ----------------------------------------------------
  haproxy_read:
    image: haproxy:2.4
    container_name: haproxy_read
    networks:
      ppv_net:
        ipv4_address: 172.20.0.7
    ports:
      - "5433:5433" # Dostępne na zewnątrz na porcie 5433
    volumes:
      - ./haproxy/haproxy_read.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    depends_on:
      - warszawa2
      - warszawa3

  # ----------------------------------------------------
  # 7. PGADMIN (IP: 172.20.0.9, port 5050)
  # ----------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    networks:
      ppv_net:
        ipv4_address: 172.20.0.9
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ppv.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    volumes:
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
      - pg_pgadmin:/var/lib/pgadmin
    depends_on:
      - warszawa1
    restart: always

  # ----------------------------------------------------
  # 8. BACKUP AGENT (IP: 172.20.0.8)
  #    - Niedzielny backup pełny (pg_basebackup)
  #    - Dzienny backup różnicowy (pg_dump)
  #    - Dzienny backup logów WAL
  # ----------------------------------------------------
  backup_agent:
    build: ./backup
    container_name: backup_agent
    networks:
      ppv_net:
        ipv4_address: 172.20.0.8
    depends_on:
      - warszawa1
    environment:
      PGPASSWORD: ReplicaPass123!
    volumes:
      - ./backup:/backup:ro
      - pg_archive:/archive:ro
      - pg_backups_full:/backups/full
      - pg_backups_diff:/backups/diff
      - pg_backups_logs:/backups/logs
    entrypoint: ["bash", "/backup/entrypoint.sh"]
    restart: always

volumes:
  pg_data_master:
  pg_data_read1:
  pg_data_read2:
  pg_data_dr:
  pg_archive:
  pg_backups_full:
  pg_backups_diff:
  pg_backups_logs:
  pg_pgadmin: